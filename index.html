<!DOCTYPE html>
<head>
  <title>pitch</title>
  <script src="name.js" defer></script>
</head>
<body>
  <input class="note" name="C" type="checkbox">C<br>
  <input class="note" name="C#" type="checkbox">C#<br>
  <input class="note" name="D" type="checkbox">D<br>
  <input class="note" name="D#" type="checkbox">D#<br>
  <input class="note" name="E" type="checkbox">E<br>
  <input class="note" name="F" type="checkbox">F<br>
  <input class="note" name="F#" type="checkbox">F#<br>
  <input class="note" name="G" type="checkbox">G<br>
  <input class="note" name="G#" type="checkbox">G#<br>
  <input class="note" name="A" type="checkbox">A<br>
  <input class="note" name="A#" type="checkbox">A#<br>
  <input class="note" name="B" type="checkbox">B<br>
  <div id="out" style="display: none;">
    <div></div>
    <button id="toggleEqButton" name="toggleEquivalent">Show equivalent chords</button>
    <div id="eqChords" style="display: none;">TESTTTTs</div>
  </div>
  <div id="out"></div>
  <button id="resetButton">Reset Chord</button>
  <script defer>
    const notes = document.getElementsByClassName("note");
    
    const run = () => {
      let input = [];
      for (let note of notes) {
        if (note.checked) {
          input.push(note.name)
        }
      }
      
      console.log(input);
      
      let output = "";
      if (input.length != 0) {
        output = name(input);
      }
      
      out = document.getElementById("out")
      if (output.length == 0) {
        out.style.display = "none";
      } else {
        out.style.display = "block";
        out.firstElementChild.innerText = output.toSorted((a, b) => a.score - b.score)[0].name;
        
        extra.innerHTML = "";
        for (let chord of output) {
          extra.innerHTML += `${chord.name} <span style="opacity: 0.5">${chord.score}</span><br>`
        }
      }
    }
    
    for (let note of notes) {
      note.addEventListener("input", run);
    }
    
    const toggleButton = document.getElementById("toggleEqButton");
    const extra = document.getElementById("eqChords");
    
    const toggleChord = (() => {
      let on = false;
      return () => {
        on = !on;
        extra.style.display = on ? "block" : "none";
        toggleButton.textContent = on ? "Hide" : "Show";
        toggleButton.textContent += " equivalent chords"
      };
    })();
    
    toggleButton.addEventListener("click", toggleChord);
    
    
    
    const reset = () => {
      console.log("resetting")
      for (let note of notes) {
        note.checked = false;
      }
      run();
    }
    
    document.getElementById("resetButton").onclick = reset;
  </script>
</body>
